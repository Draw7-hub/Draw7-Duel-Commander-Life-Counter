<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Draw Seven Life Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white:      #f0f4ff;
    --blue:       #1a5fb4;
    --blue-light: #4a90d9;
    --blue-pale:  #c8dcf5;
    --red:        #c0392b;
    --red-light:  #e74c3c;
    --navy:       #0d2145;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Rajdhani', sans-serif;
  }

  .app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100dvh;
    position: relative;
    transition: filter 0.35s ease;
  }
  .app.paused { filter: grayscale(1) brightness(0.65); pointer-events: none; }

  /* ── Divider ── */
  .divider {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: #ffffff;
    z-index: 10;
    box-shadow: none;
  }

  .divider-gem {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 5.5vh; height: 5.5vh;
    background: radial-gradient(circle at 38% 32%, #ffffff, var(--blue-light), var(--blue));
    border-radius: 50%;
    border: 2.5px solid var(--white);
    box-shadow: 0 0 18px rgba(74,144,217,0.9), 0 0 40px rgba(74,144,217,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2vh;
    color: var(--navy);
    z-index: 11;
    cursor: pointer;
    transition: transform 0.15s;
    font-weight: 900;
  }
  .divider-gem:active { transform: translate(-50%, -50%) scale(0.87); }

  /* ── PAUSE button — vertical pill on right edge, centred on divider ── */
  .pause-btn {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;

    /* rotated sideways — text reads bottom-to-top */
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: translateY(-50%) rotate(180deg);

    height: 18vh;
    width: 6vw;
    min-width: 28px;

    background: rgba(240,244,255,0.09);
    border: 1.5px solid rgba(240,244,255,0.28);
    border-right: none;
    border-radius: 6px 0 0 6px;

    color: rgba(240,244,255,0.65);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.6vh;
    letter-spacing: 0.35vw;
    text-transform: uppercase;

    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .pause-btn:active {
    background: rgba(240,244,255,0.22);
    color: var(--white);
    border-color: rgba(240,244,255,0.6);
  }

  /* ── Player zones ── */
  .player {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .player.top {
    transform: rotate(180deg);
    background:
      radial-gradient(ellipse at 50% 60%, rgba(26,95,180,0.2) 0%, transparent 65%),
      linear-gradient(180deg, #0d2145 0%, #112a55 100%);
  }
  .player.bottom {
    background:
      radial-gradient(ellipse at 50% 60%, rgba(26,95,180,0.2) 0%, transparent 65%),
      linear-gradient(180deg, #0d2145 0%, #112a55 100%);
  }

  .player::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg,
      var(--red) 0%, var(--red) 33%,
      var(--white) 33%, var(--white) 66%,
      var(--blue) 66%, var(--blue) 100%);
    opacity: 0.9;
    pointer-events: none;
    z-index: 2;
  }

  .player.active-turn {
    background:
      radial-gradient(ellipse at 50% 60%, rgba(231,76,60,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 60%, rgba(26,95,180,0.2) 0%, transparent 65%),
      linear-gradient(180deg, #0d2145 0%, #112a55 100%);
  }

  /* ── Hit zones ── */
  .hit-zone {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s;
    z-index: 1;
  }
  .hit-zone.plus {
    top: 0;
    height: calc(50% - 1vh);
    background: linear-gradient(180deg, rgba(74,144,217,0.08) 0%, transparent 100%);
    border-bottom: 1px solid rgba(74,144,217,0.1);
  }
  .hit-zone.minus {
    top: 50%;
    bottom: 8.5vh;
    height: auto;
    background: linear-gradient(0deg, rgba(192,57,43,0.08) 0%, transparent 100%);
    border-top: 1px solid rgba(192,57,43,0.1);
  }
  .hit-zone.plus:active  { background: rgba(74,144,217,0.22); }
  .hit-zone.minus:active { background: rgba(192,57,43,0.22); }

  .hit-icon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 6vh;
    color: rgba(200,220,245,0.22);
    transition: color 0.1s, transform 0.1s;
  }
  .hit-zone:active .hit-icon { color: var(--white); transform: scale(1.3); }

  /* ── Center info — timers floated higher, life below ── */
  .center-stack {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }

  /* countdown sits above life with clear gap */
  .countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4vh;
    color: var(--blue-pale);
    letter-spacing: 0.5vw;
    text-shadow: 0 0 12px rgba(74,144,217,0.6);
    line-height: 1;
    margin-bottom: 0.5vh;
    transition: color 0.3s;
    text-decoration: underline;
    text-underline-offset: 4px;

  }
  .countdown.warning { color: #f5a623; text-shadow: 0 0 12px rgba(245,166,35,0.7); }
  .countdown.danger  { color: var(--red-light); text-shadow: 0 0 14px rgba(231,76,60,0.8); animation: pulse-red 0.75s infinite; }

  .life-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28vh;
    color: var(--white);
    line-height: 0.82;
    letter-spacing: 0.5vw;
    text-shadow: 0 4px 8px rgba(0,0,0,0.7);
    transition: color 0.3s, text-shadow 0.3s;
  }
  .active-turn .life-number {
    color: #f5c518;
    text-shadow: 0 4px 8px rgba(0,0,0,0.7);
  }
  .life-number.bump-up   { animation: bumpUp   0.22s ease-out; }
  .life-number.bump-down { animation: bumpDown 0.22s ease-out; }

  @keyframes bumpUp {
    0%  { transform: scale(1);    color: var(--white); }
    45% { transform: scale(1.08); color: #60d8ff; text-shadow: 0 0 35px rgba(60,200,255,0.95); }
    100%{ transform: scale(1);    color: var(--white); }
  }
  @keyframes bumpDown {
    0%  { transform: scale(1);    color: var(--white); }
    45% { transform: scale(0.93); color: #ff6b6b; text-shadow: 0 0 35px rgba(255,80,80,0.95); }
    100%{ transform: scale(1);    color: var(--white); }
  }

  /* turn timer sits below life with clear gap */
  .turn-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4vh;
    color: var(--red-light);
    letter-spacing: 0.5vw;
    text-shadow: 0 0 14px rgba(231,76,60,0.75);
    line-height: 1;
    margin-top: 0.5vh;
    transition: color 0.2s;
  }
  .turn-timer.inactive {
    color: rgba(231,76,60,0.28);
    text-shadow: none;
  }

  /* ── PASS TURN bar ── */
  .pass-btn {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 8.5vh;
    z-index: 3;
    pointer-events: all;
    cursor: pointer;
    border: none;
    border-top: 2px solid rgba(231,76,60,0.2);
    background: rgba(231,76,60,0.06);
    color: rgba(231,76,60,0.3);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 2.4vh;
    letter-spacing: 0.5vw;
    text-transform: uppercase;
    transition: background 0.12s, color 0.12s, border-color 0.12s, box-shadow 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2vw;
  }
  .pass-btn.active-turn {
    background: #8b0000;
    border-top: 2px solid #a00000;
    color: #ffffff;
    box-shadow: none;
  }
  .pass-btn.active-turn:active {
    background: #6b0000;
    box-shadow: none;
  }
  .pass-arrow { font-size: 2.6vh; }

  /* ── Start buttons ── */
  .start-area {
    position: absolute;
    bottom: 9.5vh;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    pointer-events: all;
    z-index: 4;
  }
  .start-btn {
    background: rgba(240,244,255,0.07);
    border: 1.5px solid rgba(74,144,217,0.4);
    color: var(--blue-pale);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.7vh;
    letter-spacing: 0.25vw;
    padding: 0.9vh 5vw;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background 0.12s;
  }
  .start-btn:active { background: rgba(74,144,217,0.22); border-color: var(--blue-light); color: var(--white); }

  /* ── PAUSE OVERLAY ── */
  .pause-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(3px);
  }
  .pause-overlay.visible { display: flex; }

  .pause-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9vh;
    color: #fff;
    letter-spacing: 1vw;
    text-shadow: 0 0 30px rgba(255,255,255,0.35);
  }

  .continue-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.6);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 2.6vh;
    letter-spacing: 0.5vw;
    padding: 1.8vh 12vw;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s;
  }
  .continue-btn:active { background: rgba(255,255,255,0.28); }

  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .flash-overlay {
    position: fixed; inset: 0;
    background: rgba(74,144,217,0.15);
    pointer-events: none;
    opacity: 0;
    z-index: 300;
    transition: opacity 0.3s;
  }
  .flash-overlay.show { opacity: 1; }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<!-- PAUSE OVERLAY -->
<div class="pause-overlay" id="pauseOverlay">
  <div class="pause-label">PAUSED</div>
  <button class="continue-btn" onclick="resumeGame()">▶ CONTINUE</button>
</div>

<!-- Single sideways PAUSE button on right edge -->
<button class="pause-btn" onclick="pauseGame()">⏸ PAUSE</button>

<div class="app" id="app">

  <!-- TOP (rotated 180°) -->
  <div class="player top" id="playerTop">
    <div class="hit-zone plus"  onclick="changeLife('top',  1)"><span class="hit-icon">＋</span></div>
    <div class="center-stack">
      <div class="countdown" id="countdownTop">50:00</div>
      <div class="life-number" id="lifeTop">20</div>
      <div class="turn-timer inactive" id="turnTop">0:00</div>
    </div>
    <div class="hit-zone minus" onclick="changeLife('top', -1)"><span class="hit-icon">－</span></div>
    <div class="start-area">
      <button class="start-btn" id="startBtnTop" onclick="startGame('top')">START</button>
    </div>
    <button class="pass-btn inactive-turn" id="passBtnTop" onclick="passTurn('top')">
      <span class="pass-arrow">⟶</span> PASS TURN <span class="pass-arrow">⟶</span>
    </button>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-gem" onclick="resetAll()">⟳</div>
  </div>

  <!-- BOTTOM -->
  <div class="player bottom" id="playerBottom">
    <div class="hit-zone plus"  onclick="changeLife('bottom',  1)"><span class="hit-icon">＋</span></div>
    <div class="center-stack">
      <div class="countdown" id="countdownBottom">50:00</div>
      <div class="life-number" id="lifeBottom">20</div>
      <div class="turn-timer inactive" id="turnBottom">0:00</div>
    </div>
    <div class="hit-zone minus" onclick="changeLife('bottom', -1)"><span class="hit-icon">－</span></div>
    <div class="start-area">
      <button class="start-btn" id="startBtnBottom" onclick="startGame('bottom')">START</button>
    </div>
    <button class="pass-btn inactive-turn" id="passBtnBottom" onclick="passTurn('bottom')">
      <span class="pass-arrow">⟶</span> PASS TURN <span class="pass-arrow">⟶</span>
    </button>
  </div>

</div>

<script>
  const opp = { top: 'bottom', bottom: 'top' };
  const state = {
    top:    { life: 20, countdown: 3000, turnSecs: 0 },
    bottom: { life: 20, countdown: 3000, turnSecs: 0 },
    activeTurn: null,
    gameStarted: false,
    paused: false,
    mainInterval: null,
  };

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function fmtCD(s)   { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
  function fmtTurn(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

  function updateCountdown(p) {
    const el = document.getElementById(`countdown${cap(p)}`);
    const s = state[p].countdown;
    el.textContent = fmtCD(s);
    el.className = 'countdown';
    if (s <= 300) el.classList.add('danger');
    else if (s <= 600) el.classList.add('warning');
  }

  function updateTurnTimer(p) {
    document.getElementById(`turn${cap(p)}`).textContent = fmtTurn(state[p].turnSecs);
  }

  function setActiveTurn(p) {
    state.activeTurn = p;
    const other = opp[p];
    document.getElementById(`turn${cap(p)}`).classList.remove('inactive');
    document.getElementById(`turn${cap(other)}`).classList.add('inactive');
    document.getElementById(`passBtn${cap(p)}`).className     = 'pass-btn active-turn';
    document.getElementById(`passBtn${cap(other)}`).className = 'pass-btn inactive-turn';
    document.getElementById(`player${cap(p)}`).classList.add('active-turn');
    document.getElementById(`player${cap(other)}`).classList.remove('active-turn');
  }

  function startGame(firstPlayer) {
    if (state.gameStarted) return;
    state.gameStarted = true;
    document.getElementById('startBtnTop').style.display    = 'none';
    document.getElementById('startBtnBottom').style.display = 'none';
    setActiveTurn(firstPlayer);
    startTick();
  }

  function startTick() {
    clearInterval(state.mainInterval);
    state.mainInterval = setInterval(() => {
      if (state.paused || !state.activeTurn) return;
      const p = state.activeTurn;
      state[p].turnSecs++;
      updateTurnTimer(p);
      ['top','bottom'].forEach(side => {
        if (state[side].countdown > 0) {
          state[side].countdown--;
          updateCountdown(side);
        }
      });
    }, 1000);
  }

  function pauseGame() {
    if (!state.gameStarted) return;
    state.paused = true;
    document.getElementById('app').classList.add('paused');
    document.getElementById('pauseOverlay').classList.add('visible');
  }

  function resumeGame() {
    state.paused = false;
    document.getElementById('app').classList.remove('paused');
    document.getElementById('pauseOverlay').classList.remove('visible');
  }

  function passTurn(p) {
    if (!state.gameStarted || state.paused || state.activeTurn !== p) return;
    setActiveTurn(opp[p]);
  }

  function changeLife(p, delta) {
    if (state.paused) return;
    state[p].life += delta;
    const el = document.getElementById(`life${cap(p)}`);
    el.textContent = state[p].life;
    el.classList.remove('bump-up', 'bump-down');
    void el.offsetWidth;
    el.classList.add(delta > 0 ? 'bump-up' : 'bump-down');
  }

  function resetAll() {
    clearInterval(state.mainInterval);
    state.mainInterval = null;
    state.gameStarted  = false;
    state.paused       = false;
    state.activeTurn   = null;
    document.getElementById('app').classList.remove('paused');
    document.getElementById('pauseOverlay').classList.remove('visible');

    ['top','bottom'].forEach(p => {
      state[p].life      = 20;
      state[p].countdown = 3000;
      state[p].turnSecs  = 0;
      document.getElementById(`life${cap(p)}`).textContent = '20';
      updateCountdown(p);
      updateTurnTimer(p);
      document.getElementById(`turn${cap(p)}`).classList.add('inactive');
      document.getElementById(`passBtn${cap(p)}`).className = 'pass-btn inactive-turn';
      document.getElementById(`player${cap(p)}`).classList.remove('active-turn');
      document.getElementById(`startBtn${cap(p)}`).style.display = '';
    });

    const f = document.getElementById('flashOverlay');
    f.classList.add('show');
    setTimeout(() => f.classList.remove('show'), 280);
  }

  updateCountdown('top');
  updateCountdown('bottom');
  updateTurnTimer('top');
  updateTurnTimer('bottom');
</script>
</body>
</html>
